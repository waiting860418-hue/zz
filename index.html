const QUIZ_LENGTH = 20;
let state = {mode:"sound",title:"еӯ—йҹіжҢ‘жҲ°",pool:[],quiz:[],index:0,score:0,locked:false,wrongs:[]};
function el(id){return document.getElementById(id)}
function show(id){["home","quiz","result"].forEach(n=>el(n).classList.remove("show"));el(id).classList.add("show")}
function shuffle(list){const a=[...list];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function take(list,n){return shuffle(list).slice(0,Math.min(n,list.length))}
function storageKey(mode){return "zyzx_done_"+mode}
function getDone(mode){
  try{return JSON.parse(localStorage.getItem(storageKey(mode))||"[]")}catch(e){return[]}
}
function saveDone(mode, ids){
  try{localStorage.setItem(storageKey(mode), JSON.stringify([...new Set(ids)]))}catch(e){}
}
function pickQuizNoRepeat(mode,pool){
  const done=getDone(mode);
  let unused=pool.filter(q=>!done.includes(q.id));
  if(unused.length<QUIZ_LENGTH){
    saveDone(mode,[]);
    unused=pool.slice();
  }
  return take(unused,QUIZ_LENGTH);
}
function start(mode){state.mode=mode;state.title=mode==="sound"?"еӯ—йҹіжҢ‘жҲ°":"еӯ—еҪўжҢ‘жҲ°";state.pool=mode==="sound"?ZHUYIN_QUESTIONS:ZIXING_QUESTIONS;state.quiz=pickQuizNoRepeat(mode,state.pool);state.index=0;state.score=0;state.locked=false;state.wrongs=[];el("modeLabel").textContent=state.title;show("quiz");render()}
function buildChoices(correct){const wrongs=[...new Set(state.pool.map(q=>q.answer).filter(a=>a!==correct))];return shuffle([correct,...take(wrongs,3)])}
function render(){state.locked=false;const q=state.quiz[state.index];const total=state.quiz.length;el("stepText").textContent=`з¬¬ ${state.index+1} / ${total} йЎҢ`;el("scoreText").textContent=`зӯ”е°Қ ${state.score} йЎҢ`;el("barFill").style.width=`${(state.index/total)*100}%`;el("questionText").textContent=q.question;el("feedback").textContent="";el("feedback").className="";el("nextBtn").classList.add("hidden");const box=el("choices");box.innerHTML="";buildChoices(q.answer).forEach(ans=>{const btn=document.createElement("button");btn.className="choice";btn.textContent=ans;btn.onclick=()=>choose(btn,ans,q);box.appendChild(btn)})}
function choose(btn,selected,q){if(state.locked)return;state.locked=true;const correct=q.answer;const fb=el("feedback");if(selected===correct){state.score++;btn.classList.add("correct");fb.textContent="зӯ”е°ҚдәҶпјҒи«ӢжҢүдёӢдёҖйЎҢ";fb.className="ok"}else{state.wrongs.push(q);btn.classList.add("wrong");fb.textContent="зӯ”йҢҜдәҶпјҢжӯЈзўәзӯ”жЎҲжҳҜпјҡ"+correct;fb.className="no";[...el("choices").children].forEach(child=>{if(child.textContent===correct)child.classList.add("correct")})}el("scoreText").textContent=`зӯ”е°Қ ${state.score} йЎҢ`;el("nextBtn").classList.remove("hidden")}
function next(){if(!state.locked)return;state.index++;if(state.index>=state.quiz.length)finish();else render()}
function finish(){saveDone(state.mode, getDone(state.mode).concat(state.quiz.map(q=>q.id)));const total=state.quiz.length;const wrong=total-state.score;const percent=Math.round((state.score/total)*100);el("barFill").style.width="100%";let msg="еҶҚз·ҙдёҖж¬ЎжңғжӣҙзҶҹпјҒ";if(percent===100)msg="еӨӘжЈ’дәҶпјҢе…Ёе°ҚпјҒ";else if(percent>=90)msg="еҫҲеҺІе®іпјҢе·®дёҖй»һе…Ёе°ҚпјҒ";else if(percent>=70)msg="иЎЁзҸҫдёҚйҢҜпјҢз№јзәҢеҠ жІ№пјҒ";el("resultEmoji").textContent=percent===100?"рҹҸҶ":"рҹҺү";el("resultText").innerHTML=`${msg}<br>е…ұ ${total} йЎҢ<br>зӯ”е°Қпјҡ${state.score} йЎҢ<br>зӯ”йҢҜпјҡ${wrong} йЎҢ<br>зӯ”е°ҚзҺҮпјҡ${percent}%`;state.wrongs.length>0?el("wrongBtn").classList.remove("hidden"):el("wrongBtn").classList.add("hidden");show("result")}
function wrongPractice(){state.quiz=[...state.wrongs];state.index=0;state.score=0;state.locked=false;state.wrongs=[];el("modeLabel").textContent="йҢҜйЎҢеҶҚз·ҙ";show("quiz");render()}
document.querySelectorAll("[data-mode]").forEach(btn=>btn.onclick=()=>start(btn.dataset.mode));
el("homeBtn").onclick=()=>show("home");el("homeAgainBtn").onclick=()=>show("home");el("againBtn").onclick=()=>start(state.mode);el("wrongBtn").onclick=wrongPractice;el("nextBtn").onclick=next;

</script>
