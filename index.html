:root{--ink:#1f2937;--muted:#64748b;--purple:#7c3aed;--blue:#38bdf8;--yellow:#facc15;--green:#22c55e;--white:rgba(255,255,255,.94)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}

button{font-family:inherit;border:0;cursor:pointer}
#app{width:min(760px,100%);min-height:100dvh;margin:auto;padding:18px;display:grid;align-items:center}
.screen{display:none}.screen.show{display:block;animation:show .2s ease}

.hero{text-align:center;border-radius:34px;padding:30px 18px 24px;margin-bottom:42px}.logo{font-size:68px;line-height:1}
h1{margin:8px 0 4px;color:var(--purple);font-size:clamp(38px,10vw,64px)}
.hero p,.note{margin:0;color:var(--muted);font-size:18px;font-weight:800}
.counts{margin:16px 0;padding:12px;border-radius:26px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.counts div{background:#f8fafc;border-radius:20px;padding:14px 8px;text-align:center}.counts b{display:block;color:#2563eb;font-size:34px;line-height:1}.counts span{display:block;margin-top:6px;color:var(--muted);font-weight:900}
.menu{display:grid;gap:24px}.mode{width:100%;min-height:155px;border-radius:34px;padding:26px 22px;display:flex;align-items:center;gap:22px;text-align:left;border:3px solid rgba(255,255,255,.9);box-shadow:0 18px 45px rgba(67,56,202,.13)}
.mode.sound{background:linear-gradient(135deg,#dbeafe,#fff)}.mode.shape{background:linear-gradient(135deg,#fef3c7,#fff)}
.emoji{font-size:56px;width:74px;text-align:center;flex-shrink:0}.mode b{display:block;font-size:35px;line-height:1.15}.mode small{display:block;margin-top:10px;color:var(--muted);font-weight:900;font-size:19px;line-height:1.35}.note{text-align:center;margin-top:34px}

.status{display:flex;justify-content:space-between;margin:10px 2px 8px;color:#475569;font-size:17px;font-weight:1000}
.bar{height:15px;background:rgba(255,255,255,.75);border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 5px rgba(15,23,42,.12)}
#barFill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--blue),var(--green))}
.question{margin:18px 0;border-radius:34px;padding:24px 16px;text-align:center}.target{font-size:34px;margin-bottom:6px}
#questionText{font-size:clamp(35px,9vw,60px);line-height:1.35;font-weight:1000;letter-spacing:1px}
.choices{display:grid;gap:13px}.choice{min-height:72px;padding:13px 16px;border-radius:25px;font-size:clamp(25px,7vw,42px);font-weight:1000;color:#1f2937;border:3px solid rgba(255,255,255,.9);box-shadow:0 11px 22px rgba(30,41,59,.12)}
.choice:nth-child(1){background:#e0f2fe}.choice:nth-child(2){background:#fef3c7}.choice:nth-child(3){background:#ede9fe}.choice:nth-child(4){background:#dcfce7}
.choice.correct{background:#bbf7d0!important;border-color:#16a34a;animation:correct .25s ease}.choice.wrong{background:#fecaca!important;border-color:#dc2626;animation:wrong .25s ease}

#feedback{min-height:54px;margin-top:14px;text-align:center;font-size:23px;font-weight:1000}.ok{color:#15803d}.no{color:#b91c1c}
.next{width:100%;min-height:62px;margin-top:8px;border-radius:22px;background:var(--purple);color:white;font-size:24px;font-weight:1000;box-shadow:0 12px 24px rgba(124,58,237,.22)}

.choice:nth-child(1),
.choice:nth-child(2),
.choice:nth-child(3),

}
.choice.wrong{

}

</style>

ˋ」","answer":"瘁"}];
const QUIZ_LENGTH = 20;
let state = {mode:"sound",title:"字音挑戰",pool:[],quiz:[],index:0,score:0,locked:false,wrongs:[]};
function el(id){return document.getElementById(id)}
function show(id){["home","quiz","result"].forEach(n=>el(n).classList.remove("show"));el(id).classList.add("show")}
function shuffle(list){const a=[...list];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function take(list,n){return shuffle(list).slice(0,Math.min(n,list.length))}
function storageKey(mode){return "zyzx_done_"+mode}
function getDone(mode){
  try{return JSON.parse(localStorage.getItem(storageKey(mode))||"[]")}catch(e){return[]}
}
function saveDone(mode, ids){
  try{localStorage.setItem(storageKey(mode), JSON.stringify([...new Set(ids)]))}catch(e){}
}
function pickQuizNoRepeat(mode,pool){
  const done=getDone(mode);
  let unused=pool.filter(q=>!done.includes(q.id));
  if(unused.length<QUIZ_LENGTH){
    saveDone(mode,[]);
    unused=pool.slice();
  }
  return take(unused,QUIZ_LENGTH);
}
function start(mode){state.mode=mode;state.title=mode==="sound"?"字音挑戰":"字形挑戰";state.pool=mode==="sound"?ZHUYIN_QUESTIONS:ZIXING_QUESTIONS;state.quiz=pickQuizNoRepeat(mode,state.pool);state.index=0;state.score=0;state.locked=false;state.wrongs=[];el("modeLabel").textContent=state.title;show("quiz");render()}
function buildChoices(correct){const wrongs=[...new Set(state.pool.map(q=>q.answer).filter(a=>a!==correct))];return shuffle([correct,...take(wrongs,3)])}
function render(){state.locked=false;const q=state.quiz[state.index];const total=state.quiz.length;el("stepText").textContent=`第 ${state.index+1} / ${total} 題`;el("scoreText").textContent=`答對 ${state.score} 題`;el("barFill").style.width=`${(state.index/total)*100}%`;el("questionText").textContent=q.question;el("feedback").textContent="";el("feedback").className="";el("nextBtn").classList.add("hidden");const box=el("choices");box.innerHTML="";buildChoices(q.answer).forEach(ans=>{const btn=document.createElement("button");btn.className="choice";btn.textContent=ans;btn.onclick=()=>choose(btn,ans,q);box.appendChild(btn)})}
function choose(btn,selected,q){if(state.locked)return;state.locked=true;const correct=q.answer;const fb=el("feedback");if(selected===correct){state.score++;btn.classList.add("correct");fb.textContent="答對了！請按下一題";fb.className="ok"}else{state.wrongs.push(q);btn.classList.add("wrong");fb.textContent="答錯了，正確答案是："+correct;fb.className="no";[...el("choices").children].forEach(child=>{if(child.textContent===correct)child.classList.add("correct")})}el("scoreText").textContent=`答對 ${state.score} 題`;el("nextBtn").classList.remove("hidden")}
function next(){if(!state.locked)return;state.index++;if(state.index>=state.quiz.length)finish();else render()}
function finish(){saveDone(state.mode, getDone(state.mode).concat(state.quiz.map(q=>q.id)));const total=state.quiz.length;const wrong=total-state.score;const percent=Math.round((state.score/total)*100);el("barFill").style.width="100%";let msg="再練一次會更熟！";if(percent===100)msg="太棒了，全對！";else if(percent>=90)msg="很厲害，差一點全對！";else if(percent>=70)msg="表現不錯，繼續加油！";el("resultEmoji").textContent=percent===100?"🏆":"🎉";el("resultText").innerHTML=`${msg}<br>共 ${total} 題<br>答對：${state.score} 題<br>答錯：${wrong} 題<br>答對率：${percent}%`;state.wrongs.length>0?el("wrongBtn").classList.remove("hidden"):el("wrongBtn").classList.add("hidden");show("result")}
function wrongPractice(){state.quiz=[...state.wrongs];state.index=0;state.score=0;state.locked=false;state.wrongs=[];el("modeLabel").textContent="錯題再練";show("quiz");render()}
document.querySelectorAll("[data-mode]").forEach(btn=>btn.onclick=()=>start(btn.dataset.mode));
el("homeBtn").onclick=()=>show("home");el("homeAgainBtn").onclick=()=>show("home");el("againBtn").onclick=()=>start(state.mode);el("wrongBtn").onclick=wrongPractice;el("nextBtn").onclick=next;
